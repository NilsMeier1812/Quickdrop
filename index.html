<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDrop - Zwei-Wege Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #drop-zone.dragover { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden fade-in relative">
        
        <!-- Header -->
        <div class="bg-blue-600 p-5 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                </svg>
                QuickDrop
            </h1>
            <div id="connection-status" class="text-xs font-medium bg-blue-700 px-2 py-1 rounded-full flex items-center gap-1 opacity-50">
                <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                Wartet...
            </div>
        </div>

        <div class="p-6">
            
            <!-- ANSICHT 1: SETUP (Nur für PC sichtbar, bis Handy scannt) -->
            <div id="setup-view" class="space-y-6 text-center">
                <div>
                    <p class="text-sm text-gray-500 mb-4">Scanne den Code mit dem Handy, um den Kanal zu öffnen:</p>
                    <div id="qrcode" class="flex justify-center p-4 bg-white border-2 border-dashed border-gray-200 rounded-xl inline-block mx-auto"></div>
                    <p class="text-xs text-gray-400 mt-2">Session ID: <span id="session-display" class="font-mono font-bold text-gray-700 text-lg tracking-widest"></span></p>
                </div>

                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase font-semibold">Oder</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <div>
                    <p class="text-sm text-gray-500 mb-3">Mit anderem Gerät verbinden:</p>
                    <div class="flex gap-2 max-w-xs mx-auto">
                        <input type="text" id="manual-session-id" placeholder="ID eingeben" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-center font-mono uppercase focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" maxlength="6" onkeypress="if(event.key === 'Enter') connectManually()">
                        <button onclick="connectManually()" class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                            Verbinden
                        </button>
                    </div>
                </div>
            </div>

            <!-- ANSICHT 2: HAUPTMENÜ (Sichtbar sobald verbunden) -->
            <div id="transfer-view" class="hidden space-y-5">
                
                <!-- Text senden Bereich -->
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Text / Link senden</label>
                    <div class="flex gap-2">
                        <input type="text" id="text-input" placeholder="Tippe etwas..." class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        <button onclick="sendTextMessage()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                            Senden
                        </button>
                    </div>
                </div>

                <!-- Datei senden Bereich -->
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Datei senden</label>
                    <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer transition-colors duration-200 hover:bg-gray-100 bg-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-8 w-8 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p class="text-sm font-medium text-gray-600">Klicken oder Datei ablegen</p>
                        <input type="file" id="file-input" class="hidden" accept="*/*">
                    </div>
                </div>

                <!-- Empfangs-Bereich (wird nur eingeblendet, wenn etwas ankommt) -->
                <div id="received-area" class="hidden bg-green-50 border border-green-200 p-4 rounded-xl">
                    <div class="flex items-center gap-2 mb-2 text-green-700">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                        <span class="text-sm font-bold uppercase tracking-wide">Neu Empfangen</span>
                    </div>
                    <p id="received-content" class="text-sm text-gray-800 break-words bg-white p-3 rounded border border-green-100 shadow-sm"></p>
                    <button id="copy-btn" onclick="copyReceivedText()" class="hidden mt-2 text-xs text-green-700 font-medium hover:underline">In Zwischenablage kopieren</button>
                </div>

            </div>

            <!-- OVERLAY: Fortschrittsbalken -->
            <div id="progress-overlay" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center p-8 z-10">
                <div class="w-full max-w-xs">
                    <div class="flex justify-between text-sm mb-2">
                        <span id="progress-text" class="font-medium text-gray-700">Arbeite...</span>
                        <span id="progress-percentage" class="text-gray-500">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="progress-bar" class="bg-blue-600 h-3 rounded-full" style="width: 0%; transition: width 0.3s;"></div>
                    </div>
                    <p id="file-info" class="text-xs text-gray-500 mt-3 text-center truncate"></p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const MAX_FILE_SIZE = 10 * 1024 * 1024;
        const CHUNK_SIZE = 500 * 1024;

        // UI Elemente
        const setupView = document.getElementById('setup-view');
        const transferView = document.getElementById('transfer-view');
        const progressOverlay = document.getElementById('progress-overlay');
        const statusBadge = document.getElementById('connection-status');
        const receivedArea = document.getElementById('received-area');
        const receivedContent = document.getElementById('received-content');
        const copyBtn = document.getElementById('copy-btn');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        // Verbindungs-Logik
        const urlParams = new URLSearchParams(window.location.search);
        const urlSessionId = urlParams.get('session');
        const isJoiner = !!urlSessionId; // true, wenn das Handy über den Link kommt
        
        let mySendSession, myListenSession;
        let lastSeenTransferId = null; // Verhindert mehrfaches Herunterladen

        // Initialisierung je nach Rolle
        if (isJoiner) {
            // HANDY ROLLE
            mySendSession = urlSessionId + '_JOINER'; // Handy schreibt auf den "_JOINER" Kanal
            myListenSession = urlSessionId;           // Handy liest den normalen Kanal
            
            setConnectedUI();
            sendHandshake(); // Dem PC sofort "Hallo" sagen
            startPolling();
        } else {
            // PC ROLLE
            const newSessionId = Math.random().toString(36).substring(2, 8).toUpperCase();
            mySendSession = newSessionId;             // PC schreibt auf den normalen Kanal
            myListenSession = newSessionId + '_JOINER';// PC liest den "_JOINER" Kanal
            
            document.getElementById('session-display').innerText = newSessionId;
            const connectUrl = window.location.href.split('?')[0] + '?session=' + newSessionId;
            new QRCode(document.getElementById("qrcode"), { text: connectUrl, width: 160, height: 160 });
            
            startPolling();
        }

        function connectManually() {
            const input = document.getElementById('manual-session-id');
            const id = input.value.trim().toUpperCase();
            if (id.length > 0) {
                // Wir tun einfach so, als hätten wir einen QR-Code gescannt
                window.location.href = window.location.pathname + '?session=' + id;
            } else {
                alert("Bitte eine Session-ID eingeben.");
            }
        }

        // --- UI FUNKTIONEN ---
        function setConnectedUI() {
            setupView.classList.add('hidden');
            transferView.classList.remove('hidden');
            statusBadge.innerHTML = '<div class="w-2 h-2 bg-green-400 rounded-full"></div> Verbunden';
            statusBadge.classList.replace('opacity-50', 'opacity-100');
            statusBadge.classList.replace('bg-blue-700', 'bg-blue-800');
        }

        function showProgress(text, fileName) {
            progressOverlay.classList.remove('hidden');
            document.getElementById('progress-text').innerText = text;
            updateProgress(0, fileName);
        }

        function hideProgress() {
            progressOverlay.classList.add('hidden');
        }

        function updateProgress(percent, fileName) {
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percentage').innerText = Math.round(percent) + '%';
            document.getElementById('file-info').innerText = fileName;
        }

        function displayReceivedContent(text, isFile) {
            receivedArea.classList.remove('hidden');
            if (isFile) {
                receivedContent.innerText = `Datei heruntergeladen: ${text}`;
                copyBtn.classList.add('hidden');
            } else {
                receivedContent.innerText = text;
                copyBtn.classList.remove('hidden');
            }
        }

        function copyReceivedText() {
            navigator.clipboard.writeText(receivedContent.innerText);
            copyBtn.innerText = "Kopiert!";
            setTimeout(() => copyBtn.innerText = "In Zwischenablage kopieren", 2000);
        }

        // --- DRAG & DROP FÜR DATEIEN ---
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => { if(e.target.files.length > 0) handleFile(e.target.files[0]); });
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });

        // --- SENDE FUNKTIONEN ---
        async function sendHandshake() {
            // Signalisiert dem Partner, dass man da ist
            const meta = { type: 'sys_handshake', transferId: Date.now() };
            fetch(`/api/transfer?action=meta&sessionId=${mySendSession}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(meta)
            }).catch(() => {}); // Ignorieren, falls es fehlschlägt
        }

        function sendTextMessage() {
            const textInput = document.getElementById('text-input');
            const text = textInput.value.trim();
            if (!text) return;
            
            // Text wie eine Datei behandeln
            const blob = new Blob([text], { type: 'text/plain' });
            blob.name = 'textnachricht.txt';
            textInput.value = ''; // Feld leeren
            
            uploadDataInChunks(blob, true);
        }

        function handleFile(file) {
            if (file.size > MAX_FILE_SIZE) { alert("Maximal 10 MB erlaubt."); return; }
            uploadDataInChunks(file, false);
        }

        async function uploadDataInChunks(fileBlob, isText = false) {
            try {
                showProgress(isText ? "Sende Text..." : "Sende Datei...", isText ? "Verschlüsselt..." : fileBlob.name);
                const totalChunks = Math.ceil(fileBlob.size / CHUNK_SIZE);
                const currentTransferId = Date.now(); // Eindeutige ID für diesen Vorgang
                
                const meta = {
                    fileName: fileBlob.name,
                    fileType: fileBlob.type || 'application/octet-stream',
                    fileSize: fileBlob.size,
                    totalChunks: totalChunks,
                    isText: isText,
                    transferId: currentTransferId
                };
                
                // 1. Meta-Daten senden
                await fetch(`/api/transfer?action=meta&sessionId=${mySendSession}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(meta)
                });

                // 2. Chunks senden
                for (let i = 0; i < totalChunks; i++) {
                    const start = i * CHUNK_SIZE;
                    const end = Math.min(start + CHUNK_SIZE, fileBlob.size);
                    const chunkBlob = fileBlob.slice(start, end);
                    
                    const base64Data = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(chunkBlob);
                    });

                    await fetch(`/api/transfer?action=chunk&sessionId=${mySendSession}&chunkIndex=${i}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: base64Data })
                    });
                    
                    updateProgress(((i + 1) / totalChunks) * 100, isText ? "" : fileBlob.name);
                }

                // Eigene Ansicht kurz bestätigen und dann wieder freigeben
                document.getElementById('progress-text').innerText = "Erfolgreich gesendet!";
                setTimeout(hideProgress, 800);

            } catch (error) {
                alert("Upload abgebrochen!\n" + error.message);
                hideProgress();
            }
        }

        // --- EMPFANGS FUNKTIONEN (Polling) ---
        function startPolling() {
            let isDownloading = false;
            
            setInterval(async () => {
                if (isDownloading) return;
                try {
                    const res = await fetch(`/api/transfer?action=meta&sessionId=${myListenSession}`);
                    if (!res.ok) return;
                    
                    const meta = await res.json();
                    
                    // Nichts Neues? Dann abbrechen.
                    if (meta.transferId === lastSeenTransferId) return;
                    lastSeenTransferId = meta.transferId;

                    // Ist es nur ein Handshake (Verbindungsaufbau)?
                    if (meta.type === 'sys_handshake') {
                        setConnectedUI();
                        return;
                    }

                    // Es ist eine echte Datei oder Text!
                    isDownloading = true;
                    await downloadChunks(meta);
                    isDownloading = false;

                } catch (e) { /* Still warten */ }
            }, 1500); // Alle 1,5 Sekunden fragen
        }

        async function downloadChunks(meta) {
            try {
                showProgress(meta.isText ? "Empfange Text..." : "Empfange Datei...", meta.isText ? "" : meta.fileName);
                const receivedBuffers = [];

                for (let i = 0; i < meta.totalChunks; i++) {
                    const res = await fetch(`/api/transfer?action=chunk&sessionId=${myListenSession}&chunkIndex=${i}`);
                    if (!res.ok) throw new Error("Fehler beim Laden");
                    
                    const json = await res.json();
                    const binaryString = atob(json.data);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let j = 0; j < binaryString.length; j++) bytes[j] = binaryString.charCodeAt(j);
                    receivedBuffers.push(bytes);

                    updateProgress(((i + 1) / meta.totalChunks) * 100, meta.isText ? "" : meta.fileName);
                }

                const finalBlob = new Blob(receivedBuffers, { type: meta.fileType });
                
                if (meta.isText) {
                    // Als Text auf der Seite anzeigen
                    const textContent = await finalBlob.text();
                    displayReceivedContent(textContent, false);
                } else {
                    // Als Datei-Download auslösen
                    const downloadUrl = URL.createObjectURL(finalBlob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = meta.fileName;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(downloadUrl);
                    displayReceivedContent(meta.fileName, true);
                }

                setTimeout(hideProgress, 500);

            } catch (error) {
                alert("Empfang fehlgeschlagen: " + error.message);
                hideProgress();
            }
        }
    </script>
</body>
</html>
