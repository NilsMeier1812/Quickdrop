<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickDrop Privat</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1e40af">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Share_icon.svg/512px-Share_icon.svg.png">

    <!-- ECHTES MANIFEST VERLINKEN -->
    <link rel="manifest" href="/manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #drop-zone.dragover { border-color: #3b82f6; background-color: #eff6ff; }
        body { overscroll-behavior-y: contain; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden fade-in relative">
        
        <!-- Header -->
        <div class="bg-blue-800 p-5 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                QuickDrop Privat
            </h1>
            <div id="connection-status" class="text-xs font-medium bg-blue-900 px-2 py-1 rounded-full flex items-center gap-1 opacity-100">
                <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                Suche Partner...
            </div>
        </div>

        <div class="p-6">
            
            <!-- ANSICHT 0: ROLLEN-SETUP -->
            <div id="role-setup-view" class="hidden text-center py-6">
                <h2 class="text-lg font-bold text-gray-800 mb-2">Einmalige Einrichtung</h2>
                <p class="text-sm text-gray-500 mb-6">Damit die Geräte sich finden, wähle bitte aus, was dieses Gerät ist:</p>
                
                <div class="flex gap-4 justify-center">
                    <button onclick="setRole('pc')" class="flex-1 bg-gray-50 hover:bg-gray-100 border-2 border-gray-200 rounded-xl p-4 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-gray-600 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <span class="font-bold text-gray-700">Dies ist der PC</span>
                    </button>
                    <button onclick="setRole('handy')" class="flex-1 bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 rounded-xl p-4 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-blue-600 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        <span class="font-bold text-blue-700">Dies ist die App</span>
                    </button>
                </div>
            </div>

            <!-- ANSICHT 1: HAUPTMENÜ -->
            <div id="transfer-view" class="hidden space-y-5">
                
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Text / Link senden</label>
                    <div class="flex gap-2">
                        <input type="text" id="text-input" placeholder="Tippe etwas..." class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        <button onclick="sendTextMessage()" class="bg-blue-800 hover:bg-blue-900 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                            Senden
                        </button>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Datei senden</label>
                    <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer transition-colors duration-200 hover:bg-gray-100 bg-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-8 w-8 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p class="text-sm font-medium text-gray-600">Klicken oder Datei ablegen</p>
                        <input type="file" id="file-input" class="hidden" accept="*/*">
                    </div>
                </div>

                <div id="received-area" class="hidden bg-green-50 border border-green-200 p-4 rounded-xl">
                    <div class="flex items-center gap-2 mb-2 text-green-700">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                        <span class="text-sm font-bold uppercase tracking-wide">Neu Empfangen</span>
                    </div>
                    <p id="received-content" class="text-sm text-gray-800 break-words bg-white p-3 rounded border border-green-100 shadow-sm"></p>
                    <button id="copy-btn" onclick="copyReceivedText()" class="hidden mt-2 text-xs text-green-700 font-medium hover:underline">In Zwischenablage kopieren</button>
                </div>
            </div>

            <!-- OVERLAY: Fortschrittsbalken -->
            <div id="progress-overlay" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center p-8 z-10">
                <div class="w-full max-w-xs">
                    <div class="flex justify-between text-sm mb-2">
                        <span id="progress-text" class="font-medium text-gray-700">Arbeite...</span>
                        <span id="progress-percentage" class="text-gray-500">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="progress-bar" class="bg-blue-600 h-3 rounded-full" style="width: 0%; transition: width 0.3s;"></div>
                    </div>
                    <p id="file-info" class="text-xs text-gray-500 mt-3 text-center truncate"></p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- ECHTEN SERVICE WORKER REGISTRIEREN ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(() => console.log("Service Worker registriert"))
                    .catch(err => console.error("SW Fehler:", err));
            });
        }

        const MAX_FILE_SIZE = 10 * 1024 * 1024;
        const CHUNK_SIZE = 500 * 1024;
        
        // Feste private Session-ID für deine eigene Kommunikation
        const PRIVATE_CHANNEL_ID = "MY_PRIVATE_VAULT_99";

        const roleSetupView = document.getElementById('role-setup-view');
        const transferView = document.getElementById('transfer-view');
        const progressOverlay = document.getElementById('progress-overlay');
        const statusBadge = document.getElementById('connection-status');
        const receivedArea = document.getElementById('received-area');
        const receivedContent = document.getElementById('received-content');
        const copyBtn = document.getElementById('copy-btn');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        let mySendSession, myListenSession;
        let lastSeenTransferId = null; 

        // Initialisierung
        const savedRole = localStorage.getItem('quickdrop_role');
        if (savedRole) {
            startApp(savedRole);
        } else {
            roleSetupView.classList.remove('hidden');
            statusBadge.classList.add('hidden');
        }

        function setRole(role) {
            localStorage.setItem('quickdrop_role', role);
            roleSetupView.classList.add('hidden');
            statusBadge.classList.remove('hidden');
            startApp(role);
        }

        function startApp(role) {
            transferView.classList.remove('hidden');
            
            if (role === 'pc') {
                mySendSession = PRIVATE_CHANNEL_ID + '_PC';             
                myListenSession = PRIVATE_CHANNEL_ID + '_HANDY';
            } else {
                mySendSession = PRIVATE_CHANNEL_ID + '_HANDY'; 
                myListenSession = PRIVATE_CHANNEL_ID + '_PC';           
            }
            
            sendHandshake();
            startPolling();
        }

        function setConnectedUI() {
            statusBadge.innerHTML = '<div class="w-2 h-2 bg-green-400 rounded-full"></div> Verbunden';
            statusBadge.classList.replace('bg-blue-900', 'bg-blue-900');
        }

        function showProgress(text, fileName) {
            progressOverlay.classList.remove('hidden');
            document.getElementById('progress-text').innerText = text;
            updateProgress(0, fileName);
        }

        function hideProgress() { progressOverlay.classList.add('hidden'); }

        function updateProgress(percent, fileName) {
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percentage').innerText = Math.round(percent) + '%';
            document.getElementById('file-info').innerText = fileName;
        }

        function displayReceivedContent(text, isFile) {
            receivedArea.classList.remove('hidden');
            if (isFile) {
                receivedContent.innerText = `Datei heruntergeladen: ${text}`;
                copyBtn.classList.add('hidden');
            } else {
                receivedContent.innerText = text;
                copyBtn.classList.remove('hidden');
            }
            playNotificationSound();
        }

        function copyReceivedText() {
            navigator.clipboard.writeText(receivedContent.innerText);
            copyBtn.innerText = "Kopiert!";
            setTimeout(() => copyBtn.innerText = "In Zwischenablage kopieren", 2000);
        }

        function playNotificationSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch (e) {
                // Sound ignorieren, falls der Browser es blockiert
            }
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => { if(e.target.files.length > 0) handleFile(e.target.files[0]); });
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });

        async function sendHandshake() {
            const meta = { type: 'sys_handshake', transferId: Date.now() };
            fetch(`/api/transfer?action=meta&sessionId=${mySendSession}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(meta)
            }).catch(() => {}); 
        }

        function sendTextMessage() {
            const textInput = document.getElementById('text-input');
            const text = textInput.value.trim();
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain' });
            blob.name = 'textnachricht.txt';
            textInput.value = ''; 
            uploadDataInChunks(blob, true);
        }

        function handleFile(file) {
            if (file.size > MAX_FILE_SIZE) { alert("Maximal 10 MB erlaubt."); return; }
            uploadDataInChunks(file, false);
        }

        async function uploadDataInChunks(fileBlob, isText = false) {
            try {
                showProgress(isText ? "Sende Text..." : "Sende Datei...", isText ? "Verschlüsselt..." : fileBlob.name);
                const totalChunks = Math.ceil(fileBlob.size / CHUNK_SIZE);
                const currentTransferId = Date.now(); 
                
                const meta = {
                    fileName: fileBlob.name,
                    fileType: fileBlob.type || 'application/octet-stream',
                    fileSize: fileBlob.size,
                    totalChunks: totalChunks,
                    isText: isText,
                    transferId: currentTransferId
                };
                
                await fetch(`/api/transfer?action=meta&sessionId=${mySendSession}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(meta)
                });

                for (let i = 0; i < totalChunks; i++) {
                    const start = i * CHUNK_SIZE;
                    const end = Math.min(start + CHUNK_SIZE, fileBlob.size);
                    const chunkBlob = fileBlob.slice(start, end);
                    
                    const base64Data = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(chunkBlob);
                    });

                    await fetch(`/api/transfer?action=chunk&sessionId=${mySendSession}&chunkIndex=${i}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: base64Data })
                    });
                    
                    updateProgress(((i + 1) / totalChunks) * 100, isText ? "" : fileBlob.name);
                }

                document.getElementById('progress-text').innerText = "Erfolgreich gesendet!";
                setTimeout(hideProgress, 800);

            } catch (error) {
                alert("Upload abgebrochen!\n" + error.message);
                hideProgress();
            }
        }

        function startPolling() {
            let isDownloading = false;
            setInterval(async () => {
                if (isDownloading) return;
                try {
                    const res = await fetch(`/api/transfer?action=meta&sessionId=${myListenSession}`);
                    if (!res.ok) return;
                    
                    const meta = await res.json();
                    if (meta.transferId === lastSeenTransferId) return;
                    lastSeenTransferId = meta.transferId;

                    if (meta.type === 'sys_handshake') {
                        setConnectedUI();
                        return;
                    }

                    isDownloading = true;
                    await downloadChunks(meta);
                    isDownloading = false;

                } catch (e) { }
            }, 1500); 
        }

        async function downloadChunks(meta) {
            try {
                showProgress(meta.isText ? "Empfange Text..." : "Empfange Datei...", meta.isText ? "" : meta.fileName);
                const receivedBuffers = [];

                for (let i = 0; i < meta.totalChunks; i++) {
                    const res = await fetch(`/api/transfer?action=chunk&sessionId=${myListenSession}&chunkIndex=${i}`);
                    if (!res.ok) throw new Error("Fehler beim Laden");
                    
                    const json = await res.json();
                    const binaryString = atob(json.data);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let j = 0; j < binaryString.length; j++) bytes[j] = binaryString.charCodeAt(j);
                    receivedBuffers.push(bytes);

                    updateProgress(((i + 1) / meta.totalChunks) * 100, meta.isText ? "" : meta.fileName);
                }

                const finalBlob = new Blob(receivedBuffers, { type: meta.fileType });
                
                if (meta.isText) {
                    const textContent = await finalBlob.text();
                    displayReceivedContent(textContent, false);
                } else {
                    const downloadUrl = URL.createObjectURL(finalBlob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = meta.fileName;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(downloadUrl);
                    displayReceivedContent(meta.fileName, true);
                }

                setTimeout(hideProgress, 500);

            } catch (error) {
                alert("Empfang fehlgeschlagen: " + error.message);
                hideProgress();
            }
        }
    </script>
</body>
</html>
